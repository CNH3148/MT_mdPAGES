<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT 國考一次過！</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_v2.css?v=1781260509">
    <link rel="stylesheet" href="markdown.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="main-header">
            <div class="header-left">
                <button id="btn-back" class="btn-icon" style="display:none;" title="回上一頁">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div id="breadcrumb" class="breadcrumb">
                    <span id="bc-home" class="bc-item">首頁</span>
                    <span id="bc-sep-sub" class="bc-sep" style="display:none;">/</span>
                    <span id="bc-subject" class="bc-item" style="display:none;">選擇科目</span>
                    <span id="bc-sep-topic" class="bc-sep" style="display:none;">/</span>
                    <span id="bc-topic" class="bc-item bc-active" style="display:none;">類群名稱</span>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="content-area">
            
            <!-- View: Home (Subject Selection) -->
            <div id="view-home" class="view active">
                <div class="home-hero">
                    <h1>選擇練習科目</h1>
                    <p>請選擇您要進行複習的科目，或選擇全科進行綜合測驗。</p>
                </div>
                
                <div class="subject-grid" id="subject-grid">
                    <button class="subject-card all-subjects" data-subject="all">
                        <h2>🌟 全科綜合</h2>
                        <p>跨科混合練習，挑戰最高 CP 值考點</p>
                    </button>
                    <!-- Subject cards will be injected here by JS -->
                </div>
            </div>

            <!-- View: Topic List (Dashboard) -->
            <div id="view-topic-list" class="view">
                <div class="topic-list-header">
                    <h2 id="current-subject-title">類群總覽</h2>
                    <div class="topic-stats">
                        <span id="stat-total-q">0 題</span>
                    </div>
                </div>
                
                <div class="topic-controls">
                    <span class="sort-label">排序方式：</span>
                    <div class="sort-buttons">
                        <button class="btn-sort active" data-sort="cp">⭐ CP 值</button>
                        <button class="btn-sort" data-sort="freq">📊 佔比</button>
                        <button class="btn-sort" data-sort="pos">📍 題號</button>
                    </div>
                </div>

                <div class="topic-list-container" id="topic-list-container">
                    <!-- Topic list items injected here -->
                </div>
            </div>

            <!-- View: Topic Detail -->
            <div id="view-topic-detail" class="view" style="padding: 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h2 id="detail-topic-title" style="font-size:1.5rem; margin:0; color:var(--primary);">類群名稱</h2>
                    <button class="btn-icon" id="btn-start-practice-top" style="background:var(--primary); color:white; border-radius:8px; padding:8px 16px; font-weight:bold; border:none; cursor:pointer;">🚀 開始練習</button>
                </div>
                <div style="background:var(--bg-card); border:1px solid var(--border-color); border-radius:12px; padding:20px; margin-bottom:24px;">
                    <h3 style="margin-bottom:12px; color:var(--accent); font-size:1.1rem;">📖 類群總結</h3>
                    <div id="detail-topic-desc" style="line-height:1.6; color:var(--text-muted); font-size:14px;">
                        (載入中...)
                    </div>
                </div>
            </div>

            <!-- View: Practice (Card Mode) -->
            <div id="view-practice" class="view">
                <div class="practice-top-bar" style="display: flex; justify-content: center; padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border-color); font-weight: 600; color: var(--primary);">
                    <span id="list-accuracy" title="目前正確率">🎯 正確率: --%</span>
                </div>
                <div class="progress-bar-top">
                    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                </div>

                <div class="practice-area">
                    <div class="question-container" id="question-card">
                        <div class="question-header">
                            <span class="badge" id="q-no">Q 1</span>
                            <div class="question-actions">
                                <div id="q-tags" class="tags-container"></div>
                            </div>
                        </div>
                        
                        <h2 class="question-text" id="q-text">載入中...</h2>
                        
                        <div class="options-grid" id="q-options">
                            <!-- Options injected here -->
                        </div>
                        
                        <div id="q-pdf-container" style="display:none; margin-top:16px;">
                            <iframe id="q-pdf-iframe" style="width:100%; height:65vh; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-card);"></iframe>
                        </div>
                    </div>

                    <div class="action-bar">
                        <button class="btn-nav" id="btn-prev">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> 上一題
                        </button>
                        <button class="btn-nav" id="btn-next">
                            下一題 <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                    
                    <div class="explanation-panel" id="explanation-panel" style="display: none;">
                        <div id="q-explanation">載入中...</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Override Answer Modal (Kept for compatibility, restyled in CSS) -->
    <div id="modal-override-answer" class="modal" style="display:none;">
        <div class="modal-content override-modal">
            <h2 class="modal-title">修改標準答案</h2>
            <div class="override-body">
                <div class="override-left">
                    <div class="pdf-wrapper"><iframe id="iframe-override-exam"></iframe></div>
                    <div class="pdf-wrapper"><iframe id="iframe-override-ans"></iframe></div>
                </div>
                <div class="override-right">
                    <p class="text-muted">這會永久性地更改伺服器上該題的標準答案。若原題庫存在爭議或送分，請仔細比對左側考卷與答案卷。</p>
                    <div class="current-ans">原始標準答案：<strong id="override-orig-ans"></strong></div>
                    <div class="override-options">
                        <label>更正之答案 (可複選)：</label>
                        <div id="override-checkboxes">
                            <label><input type="checkbox" value="A" class="override-chk"> A</label>
                            <label><input type="checkbox" value="B" class="override-chk"> B</label>
                            <label><input type="checkbox" value="C" class="override-chk"> C</label>
                            <label><input type="checkbox" value="D" class="override-chk"> D</label>
                        </div>
                    </div>
                    <input type="hidden" id="override-subject">
                    <input type="hidden" id="override-year">
                    <input type="hidden" id="override-exam-id">
                    <input type="hidden" id="override-no">
                    <input type="hidden" id="override-list-idx">
                    <div class="modal-actions">
                        <button class="btn-secondary" id="btn-override-cancel">取消</button>
                        <button class="btn-danger" id="btn-override-confirm">確定更改</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app_v2.js?v=3"></script>
</body>
</html>
